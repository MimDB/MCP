name: Publish MCP to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test all packages
        run: pnpm test

      - name: Publish @mimdb/mcp (public)
        run: |
          dir="packages/mcp"

          # Strip devDependencies and scripts for clean publish
          node -e "
            const pkg = require('./$dir/package.json');
            delete pkg.devDependencies;
            delete pkg.scripts;
            require('fs').writeFileSync('./$dir/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          cd "$dir"
          CURRENT=$(npm view "@mimdb/mcp" version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            echo "Publishing @mimdb/mcp@$LOCAL (current: $CURRENT)"
            npm publish --access public --provenance
          else
            echo "Skipping @mimdb/mcp@$LOCAL (already published)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mimdb/mcp-admin (private)
        run: |
          dir="packages/mcp-admin"

          # Strip devDependencies and scripts for clean publish
          node -e "
            const pkg = require('./$dir/package.json');
            delete pkg.devDependencies;
            delete pkg.scripts;
            require('fs').writeFileSync('./$dir/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          cd "$dir"
          CURRENT=$(npm view "@mimdb/mcp-admin" version 2>/dev/null || echo "0.0.0")
          LOCAL=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$LOCAL" ]; then
            echo "Publishing @mimdb/mcp-admin@$LOCAL (current: $CURRENT)"
            npm publish --access restricted --provenance
          else
            echo "Skipping @mimdb/mcp-admin@$LOCAL (already published)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
